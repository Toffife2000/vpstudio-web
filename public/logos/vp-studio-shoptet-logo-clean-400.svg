  <circle cx="200" cy="172" r="116" stroke="url(#vp)" stroke-width="9" opacity="0.86"/>
  <path d="M64 297C115 329 285 329 336 297" stroke="#9cff6e" stroke-opacity="0.2" stroke-width="2"/>
